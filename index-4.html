        var bin = el('span', { class: 'hav-result-bin' });
        bin.appendChild(el('span', { class: 'hav-result-bit' + (carry ? ' is-on' : ''), text: String(carry) }));
        bin.appendChild(el('span', { class: 'hav-result-bit' + (sum ? ' is-on' : ''),   text: String(sum)   }));
        resultBox.appendChild(bin);
        resultBox.appendChild(el('span', { class: 'hav-result-tail',
          text: ' (tvíundakerfi) — ' + dec + ' í tugakerfi'
        }));
      }

      rebuild();
    }

    /* ---------- Sanngildistöflu-skoðari (6 rökhlið) ---------- */
    function renderTruthTable(figure) {
      // Hvert hlið með SVG-tákni, formúlu og útkomu-falli.
      var GATES = [
        { key: 'and',  name: 'AND',  formula: 'A · B',     desc: 'Útkoma er 1 aðeins þegar BÆÐI eru 1.',
          op: function (a, b) { return a & b; },
          symbol: '<path d="M 14 8 L 30 8 A 17 17 0 0 1 30 42 L 14 42 Z" />' },
        { key: 'or',   name: 'OR',   formula: 'A + B',     desc: 'Útkoma er 1 ef ANNAÐ HVORT (eða bæði) eru 1.',
          op: function (a, b) { return a | b; },
          symbol: '<path d="M 14 8 Q 28 8 47 25 Q 28 42 14 42 Q 22 25 14 8 Z" />' },
        { key: 'nand', name: 'NAND', formula: '¬(A · B)',  desc: 'Andstaða AND. Útkoma er 1 nema bæði séu 1.',
          op: function (a, b) { return (a & b) ^ 1; },
          symbol: '<path d="M 14 8 L 30 8 A 17 17 0 0 1 30 42 L 14 42 Z" /><circle cx="52" cy="25" r="3.5" class="tt-symbol-bubble" />' },
        { key: 'nor',  name: 'NOR',  formula: '¬(A + B)',  desc: 'Andstaða OR. Útkoma er 1 aðeins þegar bæði eru 0.',
          op: function (a, b) { return (a | b) ^ 1; },
          symbol: '<path d="M 14 8 Q 28 8 47 25 Q 28 42 14 42 Q 22 25 14 8 Z" /><circle cx="52" cy="25" r="3.5" class="tt-symbol-bubble" />' },
        { key: 'xor',  name: 'XOR',  formula: 'A ⊕ B',     desc: 'Útkoma er 1 þegar nákvæmlega EITT inntak er 1.',
          op: function (a, b) { return a ^ b; },
          symbol: '<path d="M 10 8 Q 18 25 10 42" class="tt-symbol-extra" /><path d="M 14 8 Q 28 8 47 25 Q 28 42 14 42 Q 22 25 14 8 Z" />' },
        { key: 'xnor', name: 'XNOR', formula: '¬(A ⊕ B)',  desc: 'Andstaða XOR. Útkoma er 1 þegar inntökin eru EINS.',
          op: function (a, b) { return (a ^ b) ^ 1; },
          symbol: '<path d="M 10 8 Q 18 25 10 42" class="tt-symbol-extra" /><path d="M 14 8 Q 28 8 47 25 Q 28 42 14 42 Q 22 25 14 8 Z" /><circle cx="52" cy="25" r="3.5" class="tt-symbol-bubble" />' }
      ];

      figure.className = 'tt-figure';
      figure.setAttribute('aria-label', 'Sanngildistöflu-skoðari fyrir sex algeng rökhlið');

      figure.appendChild(el('figcaption', {
        class: 'tt-title',
        text: 'Önnur rökhlið og sanngildistöflur'
      }));
      figure.appendChild(el('p', {
        class: 'tt-hint',
        text: 'Veldu rökhlið til að sjá tákn þess og sanngildistöflu. Smelltu á A og B til að sjá hvaða röð kveikir á frálaginu.'
      }));

      // Velja-pílur
      var selector = el('div', { class: 'tt-selector' });
      GATES.forEach(function (g) {
        var btn = el('button', { class: 'tt-pill', type: 'button', 'data-gate': g.key, text: g.name });
        btn.addEventListener('click', function () { select(g.key); });
        selector.appendChild(btn);
      });
      figure.appendChild(selector);

      // Kort: tákn + uppl.
      var card = el('div', { class: 'tt-card' });
      figure.appendChild(card);

      var state = { a: 0, b: 0 };
      var current = 'and';

      function select(key) {
        current = key;
        state = { a: 0, b: 0 };
        selector.querySelectorAll('.tt-pill').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-gate') === key);
        });
        render();
      }

      function render() {
        var g = GATES.find(function (x) { return x.key === current; });
        card.innerHTML = '';

        // Vinstri: SVG-tákn
        var left = el('div', { class: 'tt-symbol-wrap' });
        var svg = el('div', { class: 'tt-symbol' });
        svg.innerHTML = [
          '<svg viewBox="0 0 65 50" xmlns="http://www.w3.org/2000/svg" class="tt-symbol-svg">',
            // inntaks-strik
            '<line x1="0" y1="15" x2="14" y2="15" class="tt-symbol-line" />',
            '<line x1="0" y1="35" x2="14" y2="35" class="tt-symbol-line" />',
            '<text x="4" y="11" class="tt-symbol-label">A</text>',
            '<text x="4" y="48" class="tt-symbol-label">B</text>',
            // hliðlíkami (path/cirles)
            '<g class="tt-symbol-body">', g.symbol, '</g>',
            // útgangslínu
            '<line x1="55" y1="25" x2="65" y2="25" class="tt-symbol-line" />',
            '<text x="60" y="20" class="tt-symbol-label">Q</text>',
          '</svg>'
        ].join('');
        left.appendChild(svg);
        var fname = el('div', { class: 'tt-name', text: g.name });
        var fformula = el('div', { class: 'tt-formula', text: g.formula });
        var fdesc = el('p', { class: 'tt-desc', text: g.desc });
        left.appendChild(fname);
        left.appendChild(fformula);
        left.appendChild(fdesc);
        card.appendChild(left);

        // Hægri: inntaksrofar + sanngildistafla
        var right = el('div', { class: 'tt-right' });

        var toggles = el('div', { class: 'tt-toggles' });
        ['a', 'b'].forEach(function (key) {
          var row = el('div', { class: 'tt-toggle-row' });
          row.appendChild(el('span', { class: 'tt-toggle-label', text: key.toUpperCase() }));
          var btns = el('div', { class: 'tt-toggle-btns' });
          [0, 1].forEach(function (v) {
            var btn = el('button', {
              class: 'tt-toggle-btn' + (state[key] === v ? ' is-on' : ''),
              type: 'button', text: String(v)
            });
            btn.addEventListener('click', function () {
              state[key] = v;
              render();
            });
            btns.appendChild(btn);
          });
          row.appendChild(btns);
          toggles.appendChild(row);
        });
        right.appendChild(toggles);

        // Q-vísir
        var qVal = g.op(state.a, state.b);
        var qWrap = el('div', { class: 'tt-q-wrap' });
        qWrap.appendChild(el('span', { class: 'tt-q-label', text: 'Q' }));
        qWrap.appendChild(el('span', { class: 'tt-q-value' + (qVal ? ' is-on' : ''), text: String(qVal) }));
        right.appendChild(qWrap);

        // Sanngildistafla
        var table = el('table', { class: 'tt-table' });
        var thead = el('thead');
        var trHead = el('tr');
        ['A', 'B', 'Q'].forEach(function (h) {
          trHead.appendChild(el('th', { scope: 'col', text: h }));
        });
        thead.appendChild(trHead);
        table.appendChild(thead);

        var tbody = el('tbody');
        for (var a = 0; a < 2; a++) {
          for (var b = 0; b < 2; b++) {
            var out = g.op(a, b);
            var tr = el('tr', {
              class: (a === state.a && b === state.b ? 'is-current' : '') + (out ? ' is-true' : ' is-false')
            });
            tr.appendChild(el('td', { text: String(a) }));
            tr.appendChild(el('td', { text: String(b) }));
            tr.appendChild(el('td', { class: 'tt-out', text: String(out) }));
            tbody.appendChild(tr);
          }
        }
        table.appendChild(tbody);
        right.appendChild(table);
        card.appendChild(right);
      }

      select('and');
    }

    /* ---------- Gate-smíðari (blueprint-byggingar) ---------- */
    function renderGateBuilder(figure) {
      // Sameiginlegir grunnar — sömu vírar og rofastöður endurnýttar fyrir AND/NOR (raðtengt)
      // og OR/NAND (samhliða). Sá eini munur er „rofategund": NO (venjul.) eða NC (andstæða).
      var SERIES = {
        wires: [
          { id: 'w1', d: 'M 70 100 L 70 80 L 180 80' },
          { id: 'w2', d: 'M 240 80 L 300 80' },
          { id: 'w3', d: 'M 360 80 L 490 80 L 490 107' },
          { id: 'w4', d: 'M 490 163 L 490 215 L 70 215 L 70 175' }
        ],
        switches: [
          { key: 'a', pad1: [180, 80], pad2: [240, 80], lblY: 65, stateY: 105, hit: [170, 50, 80, 60] },
          { key: 'b', pad1: [300, 80], pad2: [360, 80], lblY: 65, stateY: 105, hit: [290, 50, 80, 60] }
        ]
      };
      var PARALLEL = {
        wires: [
          { id: 'w1', d: 'M 70 100 L 70 50 L 180 50' },
          { id: 'w2', d: 'M 130 50 L 130 210 L 180 210' },
          { id: 'w3', d: 'M 240 50 L 420 50',  branch: 'a' },
          { id: 'w4', d: 'M 240 210 L 420 210', branch: 'b' },
          { id: 'w5', d: 'M 420 50 L 420 210' },
          { id: 'w6', d: 'M 420 50 L 490 50 L 490 107' },
          { id: 'w7', d: 'M 490 163 L 490 230 L 70 230 L 70 175' }
        ],
        switches: [
          { key: 'a', pad1: [180, 50],  pad2: [240, 50],  lblY: 35,  stateY: 75,  hit: [170, 20,  80, 60] },
          { key: 'b', pad1: [180, 210], pad2: [240, 210], lblY: 195, stateY: 235, hit: [170, 180, 80, 60] }
        ]
      };

      var GATES = {
        and:  { name: 'AND',  formula: 'A · B',     wiring: 'series',   switchType: 'no',
                intro: 'Raðtengt með venjulegum rofum: ljósið kviknar þegar BÆÐI eru lokuð.' },
        or:   { name: 'OR',   formula: 'A + B',     wiring: 'parallel', switchType: 'no',
                intro: 'Samhliða með venjulegum rofum: ljósið kviknar þegar ANNAR (eða báðir) eru lokaðir.' },
        nand: { name: 'NAND', formula: '¬(A · B)',  wiring: 'parallel', switchType: 'nc',
                intro: 'Samhliða með andstæðu-rofum: ljósið er ALLTAF kveikt nema BÁÐIR séu lokaðir.' },
        nor:  { name: 'NOR',  formula: '¬(A + B)',  wiring: 'series',   switchType: 'nc',
                intro: 'Raðtengt með andstæðu-rofum: ljósið kviknar AÐEINS þegar báðir rofar eru opnir.' }
      };

      // Hjálpartól: er rofi raunverulega lokaður (hleypir straumi)?
      function closedOf(gate, key, state) {
        // NC = andstæða: lokaður þegar inntak er 0 (rofi ekki togglaður).
        return gate.switchType === 'nc' ? !state[key] : state[key];
      }
      // Lifir rafrásin? Series: bæði lokuð. Parallel: að minnsta kosti annar lokaður.
      function gateLive(gate, state) {
        var ca = closedOf(gate, 'a', state);
        var cb = closedOf(gate, 'b', state);
        return gate.wiring === 'series' ? (ca && cb) : (ca || cb);
      }

      figure.className = 'gbuilder-figure';
      figure.setAttribute('aria-label', 'Gagnvirk smíðatöflu rökhliða');

      figure.appendChild(el('figcaption', {
        class: 'gbuilder-title',
        text: 'Smíðaðu þitt eigið rökhlið'
      }));
      figure.appendChild(el('p', {
        class: 'gbuilder-hint',
        text: 'Veldu rökhlið. Þá birtast strikaðar línur — smelltu á hverja til að tengja vír. Þegar rafrásin er fullbúin geturðu kveikt á rofunum og prófað hana.'
      }));

      var selector = el('div', { class: 'gbuilder-selector' });
      ['and', 'or'].forEach(function (k) {
        var g = GATES[k];
        var btn = el('button', { class: 'gbuilder-pill', type: 'button', 'data-gate': k });
        btn.appendChild(el('span', { class: 'gbuilder-pill-name',    text: g.name }));
        btn.appendChild(el('span', { class: 'gbuilder-pill-formula', text: g.formula }));
        btn.addEventListener('click', function () { selectGate(k); });
        selector.appendChild(btn);
      });
      figure.appendChild(selector);

      var introEl = el('p', { class: 'gbuilder-intro',
                               text: 'Veldu AND eða OR til að sjá teikninguna.' });
      figure.appendChild(introEl);

      var svgWrap = el('div', { class: 'gbuilder-svg-wrap' });
      figure.appendChild(svgWrap);

      var progress = el('p', { class: 'gbuilder-progress', text: '' });
      figure.appendChild(progress);

      var status = el('div', { class: 'gbuilder-status' });
      function makeChip(label) {
        var chip = el('div', { class: 'gbuilder-chip' });
        chip.appendChild(el('span', { class: 'gbuilder-chip-label', text: label }));
        var val = el('span', { class: 'gbuilder-chip-value', text: '—' });
        chip.appendChild(val);
        return { el: chip, val: val };
      }
      var chipA   = makeChip('A');
      var chipB   = makeChip('B');
      var chipOut = makeChip('Frálag');
      status.appendChild(chipA.el);
      status.appendChild(chipB.el);
      status.appendChild(chipOut.el);
      figure.appendChild(status);

      // ===== Staða =====
      var current = null;
      var built   = {};
      var state   = { a: false, b: false };

      function selectGate(key) {
        current = key;
        built = {};
        state = { a: false, b: false };
        selector.querySelectorAll('.gbuilder-pill').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-gate') === key);
        });
        introEl.textContent = GATES[key].intro;
        rebuild();
      }

      function isComplete() {
        if (!current) return false;
        return getWires().every(function (w) { return built[w.id]; });
      }
      function getWires() {
        return (GATES[current].wiring === 'series' ? SERIES.wires : PARALLEL.wires);
      }
      function getSwitches() {
        return (GATES[current].wiring === 'series' ? SERIES.switches : PARALLEL.switches);
      }

      function rebuild() {
        if (!current) {
          svgWrap.innerHTML = '';
          progress.textContent = '';
          chipA.val.textContent = chipB.val.textContent = chipOut.val.textContent = '—';
          chipA.el.classList.remove('is-on');
          chipB.el.classList.remove('is-on');
          chipOut.el.classList.remove('is-on');
          return;
        }
        var g = GATES[current];
        var wires = getWires();
        var switches = getSwitches();
        var complete = isComplete();
        var ca = closedOf(g, 'a', state);
        var cb = closedOf(g, 'b', state);
        var live = complete && gateLive(g, state);

        var s = [];
        s.push('<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" class="gbuilder-svg">');

        // Vírar (hver vír er sér <g> með hit + sjónlegt path)
        wires.forEach(function (w) {
          var isBuilt = !!built[w.id];
          var wireLive = false;
          if (isBuilt) {
            if (w.branch === 'a') wireLive = ca && complete;
            else if (w.branch === 'b') wireLive = cb && complete;
            else wireLive = live;
          }
          var classes = ['gbuilder-wire'];
          classes.push(isBuilt ? 'is-built' : 'is-blueprint');
          if (wireLive) classes.push('is-live');
          s.push('<g class="gbuilder-wire-group ' + (isBuilt ? 'is-built' : '') + '" data-wire="' + w.id + '">');
          s.push('<path d="' + w.d + '" class="gbuilder-wire-hit" />');
          s.push('<path d="' + w.d + '" class="' + classes.join(' ') + '" />');
          s.push('</g>');
        });

        // Rafhlaða
        s.push('<g class="circuit-battery">');
        s.push('<line x1="55" y1="100" x2="85" y2="100" class="cell-long"  />');
        s.push('<line x1="62" y1="125" x2="78" y2="125" class="cell-short" />');
        s.push('<line x1="55" y1="150" x2="85" y2="150" class="cell-long"  />');
        s.push('<line x1="62" y1="175" x2="78" y2="175" class="cell-short" />');
        s.push('<text x="95" y="106" class="circuit-label">+</text>');
        s.push('<text x="95" y="181" class="circuit-label">−</text>');
        s.push('</g>');

        // Rofar
        switches.forEach(function (sw) {
          var closed = closedOf(g, sw.key, state);
          var pivot = sw.pad1[0] + ' ' + sw.pad1[1];
          var leverTr = closed ? '' : ('rotate(-30 ' + pivot + ')');
          var leverClass = 'circuit-lever' + (g.switchType === 'nc' ? ' is-nc' : '');
          s.push('<g class="gbuilder-switch' + (complete ? '' : ' is-disabled') + '" data-switch="' + sw.key + '">');
          s.push('<rect class="circuit-hit" x="' + sw.hit[0] + '" y="' + sw.hit[1] + '" width="' + sw.hit[2] + '" height="' + sw.hit[3] + '" />');
          s.push('<circle cx="' + sw.pad1[0] + '" cy="' + sw.pad1[1] + '" r="5" class="circuit-pad" />');
          s.push('<circle cx="' + sw.pad2[0] + '" cy="' + sw.pad2[1] + '" r="5" class="circuit-pad" />');
          s.push('<line class="' + leverClass + '" x1="' + sw.pad1[0] + '" y1="' + sw.pad1[1] + '" x2="' + sw.pad2[0] + '" y2="' + sw.pad2[1] + '" transform="' + leverTr + '" />');
          var lblText = sw.key.toUpperCase();
          if (g.switchType === 'nc') lblText += ' ¬';
          s.push('<text x="' + ((sw.pad1[0] + sw.pad2[0]) / 2) + '" y="' + sw.lblY + '" class="circuit-switch-label">' + lblText + '</text>');
          s.push('<text x="' + ((sw.pad1[0] + sw.pad2[0]) / 2) + '" y="' + sw.stateY + '" class="circuit-switch-state">' + (closed ? 'lokaður' : 'opinn') + '</text>');
          s.push('</g>');
        });

        // ÍLAG / FRÁLAG röðunarmerki
        var allX = [];
        switches.forEach(function (sw) { allX.push(sw.pad1[0], sw.pad2[0]); });
        var avgX = allX.reduce(function (a, b) { return a + b; }, 0) / allX.length;
        s.push('<text x="' + avgX + '" y="14" class="circuit-section-label">ÍLAG</text>');
        s.push('<text x="490" y="20" class="circuit-section-label">FRÁLAG</text>');

        // Pera
        s.push('<g class="circuit-bulb' + (live ? ' is-on' : '') + '">');
        s.push('<g class="circuit-bulb-rays">');
        s.push('<line x1="490" y1="80"  x2="490" y2="68"  />');
        s.push('<line x1="455" y1="100" x2="443" y2="88"  />');
        s.push('<line x1="525" y1="100" x2="537" y2="88"  />');
        s.push('<line x1="445" y1="135" x2="430" y2="135" />');
        s.push('<line x1="535" y1="135" x2="550" y2="135" />');
        s.push('</g>');
        s.push('<circle cx="490" cy="135" r="28" class="circuit-bulb-glass" />');
        s.push('<path d="M 478 146 L 483 130 L 490 146 L 497 130 L 502 146" class="circuit-bulb-fil" />');
        s.push('<rect x="480" y="159" width="20" height="9" class="circuit-bulb-base" />');
        s.push('</g>');

        s.push('</svg>');
        svgWrap.innerHTML = s.join('');

        // Click handlers
        svgWrap.querySelectorAll('.gbuilder-wire-group').forEach(function (grp) {
          if (grp.classList.contains('is-built')) return;
          grp.addEventListener('click', function () {
            built[grp.getAttribute('data-wire')] = true;
            rebuild();
          });
        });
        svgWrap.querySelectorAll('.gbuilder-switch').forEach(function (grp) {
          if (grp.classList.contains('is-disabled')) return;
          grp.addEventListener('click', function () {
            var k = grp.getAttribute('data-switch');
            state[k] = !state[k];
            rebuild();
          });
        });

        var totalWires = wires.length;
        var builtCount = wires.filter(function (w) { return built[w.id]; }).length;
        if (complete) {
          progress.textContent = '✓ Rafrásin er tilbúin! Smelltu á rofa A og B til að prófa hana.';
          progress.className = 'gbuilder-progress is-complete';
        } else {
          progress.textContent = builtCount + '/' + totalWires + ' vírar tengdir — smelltu á strikaðar línur til að teikna þá.';
          progress.className = 'gbuilder-progress';
        }

        chipA.val.textContent = complete ? (state.a ? '1' : '0') : '—';
        chipB.val.textContent = complete ? (state.b ? '1' : '0') : '—';
        chipOut.val.textContent = complete ? (live ? '1' : '0') : '—';
        chipA.el.classList.toggle('is-on',   complete && state.a);
        chipB.el.classList.toggle('is-on',   complete && state.b);
        chipOut.el.classList.toggle('is-on', live);
      }

      rebuild();
    }

    /* ---------- OR-rafrás (samhliða rofar) ---------- */
    function renderOrCircuit(figure) {

      figure.setAttribute('aria-label', 'Gagnvirk rafrás með tveimur samhliða rofum og peru sem virkar sem OR-hlið');

      }));

          '<g class="circuit-wires-a">',

          '</g>',
          // Grein B — lit when B is closed

          '</g>',

          // Rafhlaða
          '<g class="circuit-battery">',

            '<line x1="62" y1="100" x2="78"  y2="100" class="cell-short" />',
            '<line x1="55" y1="130" x2="85"  y2="130" class="cell-long"  />',
            '<line x1="62" y1="150" x2="78"  y2="150" class="cell-short" />',
            '<text x="95"  y="86" class="circuit-label">+</text>',
            '<text x="95"  y="156" class="circuit-label">−</text>',
          '</g>',

          // Rofi A (efri grein)
          '<g class="circuit-switch" data-switch="a">',
            '<rect class="circuit-hit" x="160" y="20" width="90" height="55" />',
            '<circle cx="175" cy="50" r="5" class="circuit-pad" />',
            '<circle cx="235" cy="50" r="5" class="circuit-pad" />',
            '<line class="circuit-lever" data-lever="a" x1="175" y1="50" x2="235" y2="50" />',
            '<text x="205" y="32" class="circuit-switch-label">A</text>',
            '<text x="205" y="74" class="circuit-switch-state" data-state="a">opinn</text>',
          '</g>',

          // Rofi B (neðri grein)

            '<circle cx="235" cy="220" r="5" class="circuit-pad" />',
            '<line class="circuit-lever" data-lever="b" x1="175" y1="220" x2="235" y2="220" />',

              '<line x1="455" y1="100" x2="443" y2="88"  />',
              '<line x1="525" y1="100" x2="537" y2="88"  />',
              '<line x1="443" y1="135" x2="428" y2="135" />',
              '<line x1="537" y1="135" x2="552" y2="135" />',
            '</g>',
            '<circle cx="490" cy="135" r="28" class="circuit-bulb-glass" />',
            '<path d="M 478 146 L 483 130 L 490 146 L 497 130 L 502 146" class="circuit-bulb-fil" />',
            '<rect x="480" y="159" width="20" height="9" class="circuit-bulb-base" />',
          '</g>',
        '</svg>'
      ].join('');
      figure.appendChild(svgWrap);

      // Stöðuspjald
      var status = el('div', { class: 'circuit-status' });
      function makeChip(label) {
        var chip = el('div', { class: 'circuit-chip' });
        chip.appendChild(el('span', { class: 'circuit-chip-label', text: label }));
        var val = el('span', { class: 'circuit-chip-value', text: '0' });
        chip.appendChild(val);
        return { el: chip, val: val };
      }
      var chipA   = makeChip('Rofi A');
      var chipB   = makeChip('Rofi B');
      var chipOut = makeChip('A + B');
      status.appendChild(chipA.el);
      status.appendChild(chipB.el);
      status.appendChild(chipOut.el);
      figure.appendChild(status);

      var bulbLabel = el('p', { class: 'circuit-bulb-label', text: 'Pera: SLÖKKT' });
      figure.appendChild(bulbLabel);

      var state = { a: false, b: false };

      function setSwitch(key, closed) {
        var lever = figure.querySelector('[data-lever="' + key + '"]');
        var pivot;
        if (key === 'a') pivot = '175 50'; else pivot = '175 220';
        lever.setAttribute('transform', closed ? '' : 'rotate(-30 ' + pivot + ')');
        var label = figure.querySelector('[data-state="' + key + '"]');
        label.textContent = closed ? 'lokaður' : 'opinn';
      }

      function update() {
        setSwitch('a', state.a);
        setSwitch('b', state.b);
        var live = state.a || state.b;
        figure.querySelector('.circuit-wires').classList.toggle('is-live', live);
        figure.querySelector('.circuit-wires-a').classList.toggle('is-live', state.a);
        figure.querySelector('.circuit-wires-b').classList.toggle('is-live', state.b);
        figure.querySelector('.circuit-bulb').classList.toggle('is-on', live);
        chipA.val.textContent  = state.a ? '1' : '0';
        chipB.val.textContent  = state.b ? '1' : '0';
        chipOut.val.textContent = live ? '1' : '0';
        chipA.el.classList.toggle('is-on',  state.a);
        chipB.el.classList.toggle('is-on',  state.b);
        chipOut.el.classList.toggle('is-on', live);
        bulbLabel.textContent = 'Pera: ' + (live ? 'KVEIKT' : 'SLÖKKT');
        bulbLabel.classList.toggle('is-on', live);
      }

      figure.querySelectorAll('.circuit-switch').forEach(function (g) {
        g.addEventListener('click', function () {
          var key = g.getAttribute('data-switch');
          state[key] = !state[key];
          update();
        });
      });

      update();
    }
    function renderHalfAdder(figure) {
      figure.className = 'halfadder-figure';
      figure.setAttribute('aria-label', 'Gagnvirk sýning á hálf-deilara: hvernig tölvur leggja saman tvær bitar');

      figure.appendChild(el('figcaption', {
        class: 'halfadder-title',
        text: 'Svona leggur tölvan saman tölur'
      }));
      figure.appendChild(el('p', {
        class: 'halfadder-hint',
        text: 'Tvö hlið duga til að leggja saman tvær bitar — XOR gefur summuna, AND segir hvort þarf að flytja yfir. Saman mynda þau hálf-deilara (e. half adder), grunneiningu allra tölva.'
      }));

      var state = { a: 0, b: 0 };

      function makeToggle(name) {
        var btn = el('button', { class: 'gate-toggle', type: 'button',
                                  'aria-label': 'Kveiktu eða slökktu á inntaki ' + name,
                                  'aria-pressed': 'false' });
        btn.appendChild(el('span', { class: 'gate-toggle-name', text: name }));
        var val = el('span', { class: 'gate-toggle-value', text: '0' });
        btn.appendChild(val);
        return { el: btn, val: val };
      }

      var aBtn = makeToggle('A');
      var bBtn = makeToggle('B');
      var inputsRow = el('div', { class: 'halfadder-inputs' });
      inputsRow.appendChild(aBtn.el);
      inputsRow.appendChild(bBtn.el);
      figure.appendChild(inputsRow);

      var circuit = el('div', { class: 'halfadder-circuit' });

      function buildGate(label, outputLabel) {
        var row = el('div', { class: 'halfadder-gate' });
        row.appendChild(el('div', { class: 'halfadder-gate-label', text: label }));
        row.appendChild(el('div', { class: 'halfadder-arrow', 'aria-hidden': 'true', text: '→' }));
        var out = el('div', { class: 'halfadder-output' });
        out.appendChild(el('span', { class: 'halfadder-output-label', text: outputLabel }));
        var valEl = el('span', { class: 'halfadder-output-value', text: '0' });
        out.appendChild(valEl);
        row.appendChild(out);
        return { row: row, val: valEl };
      }

      var xorGate = buildGate('XOR (A ⊕ B)', 'Summa');
      var andGate = buildGate('AND (A ∧ B)', 'Flutningur');
      circuit.appendChild(xorGate.row);
      circuit.appendChild(andGate.row);
      figure.appendChild(circuit);

      var result = el('p', { class: 'halfadder-result', role: 'status', 'aria-live': 'polite' });
      figure.appendChild(result);

      function update() {
        aBtn.el.classList.toggle('is-on', state.a === 1);
        bBtn.el.classList.toggle('is-on', state.b === 1);
        aBtn.el.setAttribute('aria-pressed', state.a === 1 ? 'true' : 'false');
        bBtn.el.setAttribute('aria-pressed', state.b === 1 ? 'true' : 'false');
        aBtn.val.textContent = String(state.a);
        bBtn.val.textContent = String(state.b);

        var sum = state.a ^ state.b;
        var carry = state.a & state.b;
        xorGate.val.textContent = String(sum);
        andGate.val.textContent = String(carry);
        xorGate.row.classList.toggle('is-on', sum === 1);
        andGate.row.classList.toggle('is-on', carry === 1);

        var dec = state.a + state.b;
        var bin = String(carry) + String(sum);
        // Notum innerHTML til þess að geta haft <strong> innan textans
        result.innerHTML = state.a + ' + ' + state.b + ' = <strong>' + bin +
                            '</strong> í tvíundakerfi (= <strong>' + dec + '</strong> í tugakerfi)';
      }

      aBtn.el.addEventListener('click', function () { state.a = 1 - state.a; update(); });
      bBtn.el.addEventListener('click', function () { state.b = 1 - state.b; update(); });

      update();
    }

    /* ---------- Hliðarstika (efnisyfirlit) ---------- */
    function renderToc(currentId) {
      var toc = document.getElementById('toc');
      toc.innerHTML = '';

      bookData.parts.forEach(function (part) {
        var partItem = el('li', { class: 'toc-part' });

        partItem.appendChild(el('h3', { class: 'toc-part-title' }, [
          el('span', { class: 'toc-part-num', text: 'Hluti ' + part.number }),
          el('span', { text: part.title })
        ]));

        var chaptersInPart = bookData.chapters.filter(function (c) {
          return c.part === part.number;
        });

        var list = el('ol', { class: 'toc-chapters' });

        if (chaptersInPart.length === 0) {
          list.appendChild(el('li', {}, [
            el('span', { class: 'toc-empty', text: 'Kemur síðar' })
          ]));
        } else {
          chaptersInPart.forEach(function (ch) {
            var link = el('a', {
              class: 'toc-link' + (ch.id === currentId ? ' is-current' : ''),
              href: '#' + ch.id
            });
            link.appendChild(el('span', { class: 'toc-link-num', text: chapterNumber(ch) }));
            link.appendChild(document.createTextNode(ch.title));
            if (ch.id === currentId) {
              link.setAttribute('aria-current', 'page');
            }
            list.appendChild(el('li', {}, [link]));
          });
        }

        partItem.appendChild(list);
        toc.appendChild(partItem);
      });
    }

    /* ---------- Kafli ---------- */
    function renderChapter(chapter) {
      var root = document.getElementById('chapter');
      root.innerHTML = '';

      if (!chapter) {
        root.appendChild(el('div', { class: 'empty-state' }, [
          el('h2', { text: 'Kaflinn fannst ekki' }),
          el('p',  { text: 'Veldu kafla úr listanum til vinstri.' })
        ]));
  
        return;
      }

      var part = bookData.parts.find(function (p) { return p.number === chapter.part; });

      root.appendChild(el('p', {
        class: 'chapter-eyebrow',
        text: 'Hluti ' + chapter.part + (part ? ' · ' + part.title : '')
      }));

      var title = el('h1', { class: 'chapter-title' });
      title.appendChild(el('span', { class: 'chapter-title-num', text: chapterNumber(chapter) + '. ' }));
      title.appendChild(document.createTextNode(chapter.title));
      root.appendChild(title);

      var body = el('div', { class: 'chapter-body' });

      // Studjum bæði legacy `visual` (eitt mynda) og nýtt `visuals` fylki þar sem
      // hver mynd hefur `after` reit sem segir á eftir hvaða málsgrein hún birtist.
      var allVisuals = (chapter.visuals || []).concat(chapter.visual ? [chapter.visual] : []);
      var byAfter = {};
      var endVisuals = [];
      allVisuals.forEach(function (v) {
        if (typeof v.after === 'number') {
          (byAfter[v.after] = byAfter[v.after] || []).push(v);
        } else {
          endVisuals.push(v);
        }
      });

      (chapter.text || []).forEach(function (paragraph, idx) {
        body.appendChild(el('p', { text: paragraph }));
        if (byAfter[idx]) {
          byAfter[idx].forEach(function (v) {
            body.appendChild(renderVisual(v));
          });
        }
      });
      endVisuals.forEach(function (v) {
        body.appendChild(renderVisual(v));
      });
      root.appendChild(body);

      if (chapter.concepts && chapter.concepts.length) {
        var section = el('section', { class: 'concepts', 'aria-labelledby': 'concepts-heading' });
        section.appendChild(el('h2', { id: 'concepts-heading', class: 'concepts-heading', text: 'Hugtök' }));

        var list = el('div', { class: 'concept-list' });
        chapter.concepts.forEach(function (c) {
          list.appendChild(el('div', { class: 'concept' }, [
            el('h3', { class: 'concept-term',        text: c.term }),
            el('p',  { class: 'concept-explanation', text: c.explanation })
          ]));
        });
        section.appendChild(list);
        root.appendChild(section);
      }

      // Næsti / fyrri kafli
      var allChapters = bookData.chapters;
      var idx = allChapters.indexOf(chapter);
      var prev = idx > 0 ? allChapters[idx - 1] : null;
      var next = idx < allChapters.length - 1 ? allChapters[idx + 1] : null;

      if (prev || next) {
        var nav = el('nav', { class: 'chapter-nav', 'aria-label': 'Næsti eða fyrri kafli' });

        if (prev) {
          var prevLink = el('a', { class: 'chapter-nav-link chapter-nav-prev', href: '#' + prev.id });
          prevLink.appendChild(el('span', { class: 'chapter-nav-dir', text: '← Fyrri kafli' }));
          prevLink.appendChild(el('span', { class: 'chapter-nav-title',
                                             text: chapterNumber(prev) + ' ' + prev.title }));
          nav.appendChild(prevLink);
        } else {
          nav.appendChild(el('span'));   // spacer svo „næsti“ haldist hægra megin
        }

        if (next) {
          var nextLink = el('a', { class: 'chapter-nav-link chapter-nav-next', href: '#' + next.id });
          nextLink.appendChild(el('span', { class: 'chapter-nav-dir', text: 'Næsti kafli →' }));
          nextLink.appendChild(el('span', { class: 'chapter-nav-title',
                                             text: chapterNumber(next) + ' ' + next.title }));
          nav.appendChild(nextLink);
        }

        root.appendChild(nav);
      }

      document.title = chapterNumber(chapter) + ' ' + chapter.title + ' — ' + bookData.title;

      // Skrunaðu efst þegar nýr kafli er valinn
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    /* ---------- Leiðsögn (hash-routing) ---------- */
    function chapterFromHash() {
      var raw = (location.hash || '').replace(/^#/, '');
      var id;
      try { id = decodeURIComponent(raw); }
      catch (e) { id = raw; }
      return bookData.chapters.find(function (c) { return c.id === id; }) || null;
    }

    function showCurrent() {
      var chapter = chapterFromHash() || bookData.chapters[0] || null;
      renderToc(chapter ? chapter.id : null);
      renderChapter(chapter);
    }

    /* ---------- Hliðarstika á símum ---------- */
    var sidebar  = document.getElementById('sidebar');
    var scrim    = document.getElementById('sidebar-scrim');
    var toggle   = document.querySelector('.menu-toggle');

    function setSidebar(open) {
      sidebar.classList.toggle('is-open', open);
      scrim.classList.toggle('is-visible', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    toggle.addEventListener('click', function () {
      setSidebar(!sidebar.classList.contains('is-open'));
    });
    scrim.addEventListener('click', function () { setSidebar(false); });

    // Loka stikunni þegar kafli er valinn (á símum)
    sidebar.addEventListener('click', function (e) {
      var link = e.target.closest('a.toc-link');
      if (link && window.matchMedia('(max-width: 860px)').matches) {
        setSidebar(false);
      }
    });

    // Esc lokar stikunni
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && sidebar.classList.contains('is-open')) {
        setSidebar(false);
        toggle.focus();
      }
    });

    /* ---------- Lesstillingar (leturstærð + næturhamur) ---------- */
    var FONT_SIZES = [18, 20, 22];
    var fontSizeIndex = 1;           // sjálfgefið: 20px
    var darkOn = false;

    function applyReadingSettings() {
      // Öll stærð er rem-bundin, svo að stilla <html> skálar allan textann
      document.documentElement.style.fontSize = FONT_SIZES[fontSizeIndex] + 'px';
      document.body.classList.toggle('is-dark', darkOn);

      var down = document.getElementById('rt-font-down');
      var up   = document.getElementById('rt-font-up');
      var sep  = document.getElementById('rt-sepia');
      down.disabled = (fontSizeIndex === 0);
      up.disabled   = (fontSizeIndex === FONT_SIZES.length - 1);
      sep.setAttribute('aria-pressed', darkOn ? 'true' : 'false');
    }

    document.getElementById('rt-font-down').addEventListener('click', function () {
      if (fontSizeIndex > 0) { fontSizeIndex--; applyReadingSettings(); }
    });
    document.getElementById('rt-font-up').addEventListener('click', function () {
      if (fontSizeIndex < FONT_SIZES.length - 1) { fontSizeIndex++; applyReadingSettings(); }
    });
    document.getElementById('rt-sepia').addEventListener('click', function () {
      darkOn = !darkOn;
      applyReadingSettings();
    });

    applyReadingSettings();

    /* ---------- Ræsing ---------- */
    window.addEventListener('hashchange', showCurrent);
    showCurrent();
  })();
  </script>
